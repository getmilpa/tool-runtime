name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    continue-on-error: ${{ matrix.php == '8.4' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHP syntax
        run: find src tests tools -name '*.php' -print0 | xargs -0 -n1 php -l >/dev/null

      - name: Code style (family standard, php-cs-fixer dry-run)
        env:
          PHP_CS_FIXER_IGNORE_ENV: 1
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPStan
        run: vendor/bin/phpstan analyse src --no-progress

      - name: PHPUnit
        run: vendor/bin/phpunit --testsuite ToolRuntime

      - name: DocBlock coverage gate
        run: php tools/validate-docblocks.php
